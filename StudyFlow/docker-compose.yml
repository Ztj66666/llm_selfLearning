version: '3.8'

services:
  backend:
    build: ./backend
    container_name: studyflow-backend
    volumes:
      - ./backend/studyflow.db:/app/studyflow.db
      - ./backend/knowledge:/app/knowledge
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
    restart: always

  frontend:
    build: ./frontend
    container_name: studyflow-frontend
    environment:
      # 浏览器端请求走 Nginx 代理的 /api 路径
      - NEXT_PUBLIC_API_URL=/api
      # 标记 Docker 环境，用于 SSR 内部路由
      - DOCKER_ENV=true
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: studyflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
